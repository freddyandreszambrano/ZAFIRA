name: Flutter Build

# Reusable workflow — se invoca desde ci.yml (no corre por sí solo).
# Fase de build: valida que la app compila APK release (no se publica).
on:
  workflow_call:
    inputs:
      flutter-version:
        description: Versión de Flutter a usar.
        type: string
        default: "3.35.0"

jobs:
  build:
    name: Build APK (dry-run)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: stable
          cache: true

      - name: Prepare .env
        run: cp .env.example .env 2>/dev/null || echo "DEVELOP_ENV=https://api-dev.zafira.com" > .env

      - name: Install deps
        run: flutter pub get

      - name: Build runners
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (dev flavor)
        if: github.ref == 'refs/heads/develop'
        run: flutter build apk --debug -t lib/main/main_dev.dart

      - name: Build APK (prod flavor)
        if: github.ref == 'refs/heads/main'
        run: flutter build apk --release -t lib/main/main_prod.dart

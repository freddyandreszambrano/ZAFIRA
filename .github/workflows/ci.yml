name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.35.0"

jobs:
  # ── 1. Análisis estático + tests ──────────────────────────────────────
  # Espejo del job `test:code` de hey-support/ci/test.yml.
  test:
    name: Test & Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Prepare .env (placeholder for envied)
        run: cp .env.example .env 2>/dev/null || echo "DEVELOP_ENV=https://api-dev.zafira.com" > .env

      - name: Install deps
        run: flutter pub get

      - name: Generate Freezed / json_serializable / envied
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib/ test/

      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage/lcov.info
          retention-days: 7

  # ── 2. Build verificación (no se publica) ─────────────────────────────
  # Solo en push a main/develop, para validar que la app compila release.
  build:
    name: Build APK (dry-run)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Prepare .env
        run: cp .env.example .env 2>/dev/null || echo "DEVELOP_ENV=https://api-dev.zafira.com" > .env

      - name: Install deps
        run: flutter pub get

      - name: Build runners
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (dev flavor)
        if: github.ref == 'refs/heads/develop'
        run: flutter build apk --debug -t lib/main/main_dev.dart

      - name: Build APK (prod flavor)
        if: github.ref == 'refs/heads/main'
        run: flutter build apk --release -t lib/main/main_prod.dart
